name: Deploy to GitHub Pages

on:
  push:
    branches: [main, DevEnviournment]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject auth config from secret
        run: printf '%s\n' "$AUTH_CONFIG_DATA" > ai-adoption-tracker/auth-config.js
        env:
          AUTH_CONFIG_DATA: ${{ secrets.AUTH_CONFIG_DATA }}

      - name: Verify auth config was created
        run: |
          if [ ! -s ai-adoption-tracker/auth-config.js ]; then
            echo "::error::auth-config.js is empty — check that AUTH_CONFIG_DATA secret is set"
            exit 1
          fi
          echo "auth-config.js created ($(wc -c < ai-adoption-tracker/auth-config.js) bytes)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, DevEnviournment]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          mkdir _site

          # Copy portal files
          cp index.html _site/
          cp tools.json _site/

          # Copy each tool
          cp -r tfs-dashboard _site/
          cp -r md-viewer _site/
          cp -r ai-adoption-tracker _site/

          # Inject auth config from secret
          printf '%s\n' "$AUTH_CONFIG_DATA" > _site/ai-adoption-tracker/auth-config.js

          # Verify
          echo "=== Deployed files ==="
          find _site -type f -name '*.html' -o -name '*.js' -o -name '*.json' | sort
          echo ""
          if [ -s _site/ai-adoption-tracker/auth-config.js ]; then
            echo "✓ auth-config.js created ($(wc -c < _site/ai-adoption-tracker/auth-config.js) bytes)"
          else
            echo "::error::auth-config.js is empty — check AUTH_CONFIG_DATA secret"
            exit 1
          fi
        env:
          AUTH_CONFIG_DATA: ${{ secrets.AUTH_CONFIG_DATA }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

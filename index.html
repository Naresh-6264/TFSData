<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Casepoint internal tools portal — dashboards, viewers, and utilities.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
<title>Casepoint Tools Portal</title>
<script>
(function(){var t=localStorage.getItem('tools_portal_theme');if(t==='light')document.documentElement.classList.add('light-theme');})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue-600: #6366f1; --blue-700: #4f46e5; --blue-800: #4338ca;
  --surface-raised: rgba(255,255,255,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.12);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.15);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.18);
  --radius: 14px; --radius-sm: 8px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --glass-bg: rgba(255,255,255,0.12); --glass-bg-strong: rgba(255,255,255,0.18);
  --glass-border: rgba(255,255,255,0.22); --glass-border-strong: rgba(255,255,255,0.35);
  --glass-blur: blur(16px); --glass-blur-strong: blur(24px);
  --glow-blue: 0 0 20px rgba(99,102,241,0.25);
  --text-primary: #f0f4ff; --text-secondary: rgba(224,231,255,0.8); --text-muted: rgba(200,210,235,0.6);
}

body {
  font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f0e17;
  background-image:
    radial-gradient(ellipse at 15% 5%, rgba(99,102,241,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 10%, rgba(14,165,233,0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(45,55,72,0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(20,184,166,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 10% 90%, rgba(139,92,246,0.2) 0%, transparent 45%);
  background-attachment: fixed;
  color: var(--text-primary); min-height: 100vh;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  display: flex; flex-direction: column;
}

/* ─── LIGHT THEME ─── */
html.light-theme body {
  --surface-raised: rgba(0,0,0,0.04);
  --glass-bg: rgba(255,255,255,0.7); --glass-bg-strong: rgba(255,255,255,0.85);
  --glass-border: rgba(0,0,0,0.1); --glass-border-strong: rgba(0,0,0,0.18);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06); --shadow-md: 0 4px 20px rgba(0,0,0,0.08); --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --glow-blue: 0 0 16px rgba(99,102,241,0.15);
  --text-primary: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
  background: #f1f5f9;
  background-image:
    radial-gradient(ellipse at 15% 5%, rgba(99,102,241,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 10%, rgba(14,165,233,0.06) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(148,163,184,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(20,184,166,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 10% 90%, rgba(139,92,246,0.05) 0%, transparent 45%);
  color: var(--text-primary);
}
html.light-theme ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
html.light-theme ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

/* ─── TOPBAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur-strong); -webkit-backdrop-filter: var(--glass-blur-strong);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: var(--shadow-sm);
}
.topbar-brand {
  display: flex; align-items: center; gap: 12px;
}
.topbar-brand svg { width: 28px; height: 28px; color: var(--blue-600); }
.topbar-brand h1 {
  font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
}
.topbar-brand .sub {
  font-size: 11px; color: var(--text-muted); font-weight: 500;
}
.topbar-actions { display: flex; align-items: center; gap: 8px; }

/* ─── THEME TOGGLE ─── */
.theme-btn {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 7px 12px;
  color: var(--text-secondary); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s var(--ease);
}
.theme-btn:hover {
  background: var(--glass-bg-strong); border-color: var(--glass-border-strong);
  color: var(--text-primary);
}
.theme-btn svg { width: 16px; height: 16px; }

/* ─── HERO ─── */
.hero {
  text-align: center; padding: 64px 32px 40px;
}
.hero h2 {
  font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 30%, #0ea5e9 60%, #5eead4 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.15; margin-bottom: 12px;
}
.hero p {
  font-size: 15px; color: var(--text-secondary); max-width: 480px; margin: 0 auto;
  line-height: 1.6;
}

/* ─── TOOL GRID ─── */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
  padding: 0 32px 64px;
  max-width: 1200px; margin: 0 auto; width: 100%;
}

/* ─── TOOL CARD ─── */
.tool-card {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  cursor: pointer;
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), border-color 0.25s var(--ease);
  display: flex; flex-direction: column; gap: 14px;
  overflow: hidden;
  text-decoration: none; color: inherit;
}
.tool-card::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--accent-color, var(--blue-600));
  opacity: 0; transition: opacity 0.25s var(--ease);
}
.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg), 0 0 30px var(--accent-glow, rgba(99,102,241,0.15));
  border-color: var(--glass-border-strong);
}
.tool-card:hover::after { opacity: 1; }
.tool-card:hover .card-arrow { transform: translateX(4px); }
.tool-card:focus-visible {
  outline: 2px solid var(--blue-600);
  outline-offset: 3px;
}

/* ─── FOCUS STYLES ─── */
.theme-btn:focus-visible {
  outline: 2px solid var(--blue-600);
  outline-offset: 2px;
}

.card-header { display: flex; align-items: center; gap: 14px; }
.card-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-icon svg { width: 22px; height: 22px; }
.card-title {
  font-size: 17px; font-weight: 700; letter-spacing: -0.2px;
  line-height: 1.3;
}
.card-desc {
  font-size: 13.5px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.card-tag {
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; letter-spacing: 0.3px;
}
.card-open {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.card-arrow {
  transition: transform 0.2s var(--ease);
  width: 14px; height: 14px;
}

/* ─── FOOTER ─── */
.portal-footer {
  margin-top: auto;
  text-align: center; padding: 24px 32px;
  font-size: 12px; color: var(--text-muted);
  border-top: 1px solid var(--glass-border);
}

/* ─── LOADING STATE ─── */
.tool-card.skeleton {
  pointer-events: none;
}
.skeleton-line {
  height: 14px; border-radius: 6px;
  background: linear-gradient(90deg, var(--glass-bg) 25%, var(--glass-bg-strong) 50%, var(--glass-bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-line.w60 { width: 60%; height: 18px; }
.skeleton-line.w100 { width: 100%; }
.skeleton-line.w80 { width: 80%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .topbar { padding: 12px 16px; }
  .hero { padding: 40px 16px 24px; }
  .tool-grid { padding: 0 16px 48px; grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
    <div>
      <h1>Casepoint Tools</h1>
      <div class="sub">Internal Tools Portal</div>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="theme-btn" id="themeToggle" title="Toggle theme" aria-label="Switch theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="themeLabel">Dark</span>
    </button>
  </div>
</header>

<!-- ─── MAIN CONTENT ─── -->
<main>
  <section class="hero" aria-labelledby="hero-heading">
    <h2 id="hero-heading">Your Toolbox</h2>
    <p>Dashboards, viewers, and utilities built for the Casepoint team. Pick a tool to get started.</p>
  </section>

  <div class="tool-grid" id="toolGrid" aria-label="Available tools" aria-busy="true">
    <!-- skeleton loaders while tools.json loads -->
    <div class="tool-card skeleton"><div class="card-header"><div class="skeleton-line w60"></div></div><div class="skeleton-line w100"></div><div class="skeleton-line w80"></div></div>
    <div class="tool-card skeleton"><div class="card-header"><div class="skeleton-line w60"></div></div><div class="skeleton-line w100"></div><div class="skeleton-line w80"></div></div>
    <div class="tool-card skeleton"><div class="card-header"><div class="skeleton-line w60"></div></div><div class="skeleton-line w100"></div><div class="skeleton-line w80"></div></div>
  </div>
</main>

<!-- ─── FOOTER ─── -->
<footer class="portal-footer">
  Casepoint Internal Tools
</footer>

<script>
/* ─── ICONS ─── */
var ICONS = {
  sprint: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  markdown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M7 15V9l3 3 3-3v6"/><path d="M17 9v6l-2-2"/></svg>',
  analytics: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>',
  default: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>'
};

var ARROW_SVG = '<svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>';

/* ─── FALLBACK TOOLS (for file:// protocol) ─── */
var FALLBACK_TOOLS = [
  {
    id: 'tfs-dashboard',
    name: 'Sprint Dashboard',
    description: 'Real-time TFS Sprint Team Dashboard for CasepointARA. Track work items, burn data, and team velocity across sprints.',
    path: 'tfs-dashboard/index.html',
    icon: 'sprint',
    accentColor: '#6366f1',
    tags: ['TFS', 'Sprint', 'Dashboard']
  },
  {
    id: 'md-viewer',
    name: 'Markdown Viewer',
    description: 'Paste or upload Markdown files and preview rendered output with live editing, syntax highlighting, and export.',
    path: 'md-viewer/index.html',
    icon: 'markdown',
    accentColor: '#0ea5e9',
    tags: ['Markdown', 'Viewer', 'Documentation']
  },
  {
    id: 'ai-adoption-tracker',
    name: 'AI Adoption Tracker',
    description: 'TFS data analysis dashboard with sprint planning, AI usage analytics, feature progress tracking, and role-based access control.',
    path: 'ai-adoption-tracker/index.html',
    icon: 'analytics',
    accentColor: '#f59e0b',
    tags: ['TFS', 'Analytics', 'Sprint', 'RBAC']
  }
];

/* ─── THEME ─── */
var themeToggle = document.getElementById('themeToggle');
var themeIcon = document.getElementById('themeIcon');
var themeLabel = document.getElementById('themeLabel');
var MOON_PATH = 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z';
var SUN_PATH = 'M12 3v1m0 16v1m-8-9H3m18 0h-1m-2.636-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z';

function isLight() {
  return document.documentElement.classList.contains('light-theme');
}

function updateThemeUI() {
  var light = isLight();
  themeIcon.innerHTML = '<path d="' + (light ? SUN_PATH : MOON_PATH) + '"/>';
  themeLabel.textContent = light ? 'Light' : 'Dark';
  themeToggle.setAttribute('aria-pressed', light ? 'true' : 'false');
  themeToggle.setAttribute('aria-label', light ? 'Switch to dark theme' : 'Switch to light theme');
}

themeToggle.addEventListener('click', function() {
  document.documentElement.classList.toggle('light-theme');
  localStorage.setItem('tools_portal_theme', isLight() ? 'light' : 'dark');
  updateThemeUI();
});

updateThemeUI();

/* ─── HELPERS ─── */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function safeHex(color) {
  return /^#[0-9a-fA-F]{6}$/.test(color) ? color : '#6366f1';
}

function safePath(path) {
  if (typeof path !== 'string') return '#';
  if (/^(javascript|data|vbscript):/i.test(path.trim())) return '#';
  return path;
}

function isValidTool(t) {
  return t && typeof t.name === 'string' && typeof t.path === 'string' &&
         typeof t.accentColor === 'string' && Array.isArray(t.tags);
}

function hexToRgba(hex, alpha) {
  var safe = safeHex(hex);
  var r = parseInt(safe.slice(1, 3), 16);
  var g = parseInt(safe.slice(3, 5), 16);
  var b = parseInt(safe.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

/* ─── RENDER TOOLS ─── */
function renderTools(tools) {
  var grid = document.getElementById('toolGrid');
  grid.setAttribute('aria-busy', 'false');
  grid.innerHTML = '';

  if (!tools || tools.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:48px 0;grid-column:1/-1">No tools available.</p>';
    return;
  }

  tools.forEach(function(tool) {
    if (!isValidTool(tool)) return;

    var color = safeHex(tool.accentColor);
    var card = document.createElement('a');
    card.className = 'tool-card';
    card.href = safePath(tool.path);
    card.style.setProperty('--accent-color', color);
    card.style.setProperty('--accent-glow', hexToRgba(color, 0.2));

    var iconBg = hexToRgba(color, 0.15);
    var iconKey = Object.prototype.hasOwnProperty.call(ICONS, tool.icon) ? tool.icon : 'default';
    var iconSvg = ICONS[iconKey];

    var tagsHtml = '';
    if (tool.tags && tool.tags.length) {
      tool.tags.forEach(function(tag) {
        tagsHtml += '<span class="card-tag" style="background:' + hexToRgba(color, 0.12) + ';color:' + color + '">' + esc(tag) + '</span>';
      });
    }

    card.innerHTML =
      '<div class="card-header">' +
        '<div class="card-icon" style="background:' + iconBg + ';color:' + color + '">' + iconSvg + '</div>' +
        '<div class="card-title">' + esc(tool.name) + '</div>' +
      '</div>' +
      '<div class="card-desc">' + esc(tool.description) + '</div>' +
      '<div class="card-footer">' +
        '<div class="card-tags">' + tagsHtml + '</div>' +
        '<div class="card-open">Open ' + ARROW_SVG + '</div>' +
      '</div>';

    grid.appendChild(card);
  });
}

/* ─── BOOT ─── */
(function boot() {
  fetch('tools.json')
    .then(function(res) {
      if (!res.ok) throw new Error('Failed to load tools.json');
      return res.json();
    })
    .then(function(tools) {
      if (!Array.isArray(tools)) throw new Error('Invalid format');
      renderTools(tools);
    })
    .catch(function() {
      renderTools(FALLBACK_TOOLS);
    });
})();
</script>
</body>
</html>
